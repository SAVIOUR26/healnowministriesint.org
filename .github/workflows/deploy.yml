name: Deploy to production (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage deploy layout
        run: |
          set -euo pipefail

          # This FTP account's root IS the web root (public_html) directly —
          # there's no sibling directory to hide bootstrap.php/content/
          # templates behind. So everything is flattened into one directory:
          # public/*'s contents at the top level (becoming
          # https://healnowministriesint.org/...), with bootstrap.php,
          # content/, and templates/ alongside them as plain subfolders.
          # content/.htaccess and templates/.htaccess deny HTTP access to
          # those two folders as a safety net (Apache only).
          #
          # The public/assets symlink is replaced with a real copy of
          # assets/{css,js,images} (FTP can't follow symlinks, and the large
          # assets/originals source photos aren't needed live).
          mkdir -p build/assets

          find public -mindepth 1 -maxdepth 1 ! -name assets -exec cp -r {} build/ \;
          cp -r assets/css build/assets/
          cp -r assets/js build/assets/
          cp -r assets/images build/assets/

          cp bootstrap.php build/
          cp -r content build/
          cp -r templates build/

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          protocol: ${{ vars.FTP_PROTOCOL || 'ftps' }}
          server-dir: ${{ vars.FTP_SERVER_DIR || '/' }}
          local-dir: build/
          dangerous-clean-slate: false
